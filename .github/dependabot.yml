version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      # Hold Node.js releases until LTS promotion (October each year).
      # Remove an entry when it enters LTS; add the next April release as it approaches.
      - dependency-name: "@types/node"
        versions: ["25.x", "26.x", "27.x", "28.x"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
